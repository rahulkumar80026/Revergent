<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="author" content="Revergent Technologies" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/svg" href="/icon.svg" />

    <!-- ✅ Mobile Friendly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title (Primary Keyword + Branding + Tagline) -->
    <title>
      Software Development Company in India | Where Innovation Meets Real-World
      Impact | Revergent Technologies
    </title>

    <!-- ✅ Meta Description (Powerful for Google CTR) -->
    <meta
      name="description"
      content="Revergent Technologies is a leading software development company in India delivering custom ERP, CRM, mobile app and AI-driven solutions. We build intelligent digital products that create measurable real-world business impact."
    />

    <!-- content="Revergent Technologies is a top-rated software development company in India specializing in custom ERP, CRM, web, and mobile app development. We engineer tomorrow’s digital solutions to transform your business." -->

    <!-- ✅ Meta Keywords -->
    <meta
      name="keywords"
      content="software development company in India, custom software development, ERP solutions, CRM software, mobile app development, AI automation, digital transformation, SaaS development, Revergent Technologies"
    />

    <!-- ✅ Canonical URL -->
    <link rel="canonical" href="https://www.revergent.in/" />

    <!-- ✅ Open Graph (For Facebook, LinkedIn, WhatsApp, etc.) -->
    <meta property="og:locale" content="en_IN" />
    <meta property="og:type" content="website" />

      property="og:title"
      content="Engineering Tomorrow’s Solutions | Revergent Technologies"
    />
    <meta
      property="og:description"
      content="Custom ERP, CRM, mobile app and AI-driven solutions engineered to deliver measurable business impact."
    />
    <meta
      property="og:image"
      content="https://www.revergent.in/assets/og-image.png"
    />
    <meta property="og:url" content="https://www.revergent.in/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Revergent Technologies" />

    <!-- ✅ Twitter Card (For X / Twitter Preview) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Where Innovation Meets Real-World Impact | Revergent Technologies"
    />
    <meta
      name="twitter:description"
      content="Revergent Technologies builds intelligent software solutions that deliver measurable real-world business impact."
    />
    <meta
      name="twitter:image"
      content="https://www.revergent.in/assets/og-image.png"
    />
    <meta name="twitter:site" content="@revergenttech" />

    <script type="application/ld+json">
